<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nền Tảng Tối Ưu Chi Phí Giao Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .header-title { color: #0d6efd; font-weight: bold; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">
                <h3 class="text-center header-title mb-4">📦 HỆ THỐNG ĐẶT ĐƠN GIAO HÀNG</h3>
                <p class="text-center text-muted">Hệ thống của Thái & Hải - Tự động hóa Logi</p>

                <form id="orderForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Tên người nhận</label>
                            <input type="text" class="form-control" id="customerName" placeholder="Ví dụ: Nguyễn Văn A" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Số điện thoại</label>
                            <input type="text" class="form-control" id="customerPhone" placeholder="Ví dụ: 0905123456" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Địa chỉ giao hàng</label>
                        <input type="text" class="form-control" id="deliveryAddress" placeholder="Số nhà, tên đường, quận/huyện..." required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Khối lượng (gram)</label>
                            <input type="number" class="form-control" id="packageWeight" placeholder="Ví dụ: 500" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Ghi chú</label>
                            <input type="text" class="form-control" id="note" placeholder="Hàng dễ vỡ, giao giờ hành chính...">
                        </div>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="button" id="submitBtn" class="btn btn-primary btn-lg fw-bold">🔍 TÌM GIÁ RẺ NHẤT & LÊN ĐƠN</button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById("submitBtn").addEventListener("click", function() {
        console.log("🚀 Đang xử lý gửi đơn hàng...");

        // 1. Lấy dữ liệu từ các ô nhập liệu
        const name = document.getElementById('customerName').value;
        const phone = document.getElementById('customerPhone').value;
        const address = document.getElementById('deliveryAddress').value;
        const weight = document.getElementById('packageWeight').value;
        const note = document.getElementById('note').value;

        // Kiểm tra xem Thái có nhập thiếu thông tin không
        if (!name || !phone || !address || !weight) {
            alert("Vui lòng điền đầy đủ các thông tin bắt buộc!");
            return;
        }

        const orderData = {
            customerName: name,
            customerPhone: phone,
            deliveryAddress: address,
            packageWeight: parseInt(weight),
            note: note
        };

        // 2. Gửi dữ liệu xuống Java Backend
        // Lưu ý: Dùng đường dẫn tương đối để tránh lỗi CORS khi chạy trên cùng server
        fetch('/api/orders/create', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(orderData)
        })
        .then(response => response.text())
        .then(data => {
            // Hiển thị thông báo thành công
            alert("KẾT QUẢ: " + data);

            // Xóa sạch form sau khi đặt thành công để đặt đơn mới
            document.getElementById("orderForm").reset();
        })
        .catch(error => {
            console.error("Lỗi:", error);
            alert("Có lỗi xảy ra khi kết nối đến Server Java!");
        });
    });
</script>

</body>
</html>
