services:
  mysql-server:
    image: mysql:8.0
    container_name: mysql-server
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: shipping_db
    ports:
      - "3306:3306"
    volumes:
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - WEBHOOK_URL=https://c78448b64e7062.lhr.life
      - N8N_PORT=5678
      - N8N_CORS_ALLOWED_ORIGINS=*
      - N8N_RESPONSE_MODE=responseNode
    volumes:
      - n8n_data:/home/node/.n8n
    dns:
      - 8.8.8.8
      - 8.8.4.4

volumes:
  n8n_data: