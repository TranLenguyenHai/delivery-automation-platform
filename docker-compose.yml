services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - WEBHOOK_URL=http://103.118.29.21:5678
      - N8N_PROTOCOL=http
      - N8N_HOST=103.118.29.21
      - N8N_PORT=5678
      - N8N_CORS_ALLOWED_ORIGINS=*
      - N8N_RESPONSE_MODE=responseNode
      - N8N_SECURE_COOKIE=false
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
    volumes:
      - ./n8n_data:/home/node/.n8n
    dns:
      - 8.8.8.8
      - 8.8.4.4